# Snowkap ESG — Railway.app one-click deploy
# https://docs.railway.com/reference/config-as-code
#
# Setup:
#   1. railway login
#   2. railway init
#   3. railway up
#   4. Set env vars via the Railway dashboard:
#        SNOWKAP_ENV=production
#        JWT_SECRET=<32+ chars>
#        REQUIRE_SIGNED_JWT=1
#        SNOWKAP_API_KEY=<random>
#        OPENAI_API_KEY=sk-proj-...
#        RESEND_API_KEY=re_...
#        SNOWKAP_FROM_ADDRESS=Snowkap ESG <newsletter@snowkap.co.in>
#        NEWSAPI_AI_KEY=<uuid>

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
