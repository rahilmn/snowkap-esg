# Snowkap ESG — Railway.app one-click deploy
# https://docs.railway.com/reference/config-as-code
#
# Setup:
#   1. railway login
#   2. railway init
#   3. railway up
#   4. Set env vars via the Railway dashboard:
#        SNOWKAP_ENV=production
#        SNOWKAP_DB_BACKEND=postgres            # required (Phase 48.0 — SQLite hard-disabled)
#        SUPABASE_DATABASE_URL=postgresql://... # required
#        JWT_SECRET=<32+ chars>
#        REQUIRE_SIGNED_JWT=1
#        SNOWKAP_API_KEY=<random>
#        OPENROUTER_API_KEY=<openrouter key>    # Opus 4.6 + Perplexity routing
#        OPENAI_API_KEY=sk-proj-...             # direct fallback
#        # --- LLM provider switch (Phase 48) ---
#        # The engine auto-selects: if OPENROUTER_API_KEY is set -> OpenRouter
#        # (Opus 4.6 / Perplexity). If it is EMPTY/unset -> direct OpenAI using
#        # OPENAI_API_KEY (reasoning_heavy -> gpt-4.1, ~4x cheaper). To run on
#        # direct OpenAI (e.g. OpenRouter out of credits): leave OPENROUTER_API_KEY
#        # unset and ensure OPENAI_API_KEY has balance. Fully reversible.
#        RESEND_API_KEY=re_...
#        SNOWKAP_FROM_ADDRESS=Snowkap ESG <newsletter@snowkap.co.in>
#        NEWSAPI_AI_KEY=<uuid>                  # sole news source (Phase 48.A)
#        SNOWKAP_INPROCESS_SCHEDULER=1          # Sunday refresh + newsletter cron
#        SNOWKAP_NEWSLETTER_ENABLED=1           # weekly Morning-Brew email
#        SNOWKAP_CORS_ORIGINS=https://app.snowkap.com

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# Phase 48 — single worker. The in-process APScheduler (Sunday refresh +
# newsletter) and the rdflib SPARQL lock both assume one process; --workers 2
# would double-fire the weekly cron (duplicate newsletters).
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
