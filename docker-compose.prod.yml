# =============================================================================
# SNOWKAP ESG Platform — Production Docker Compose
# Per MASTER_BUILD_PLAN Phase 8: Production config with resource limits,
# no debug ports exposed, SSL-ready nginx, named volumes.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1. esg-api — FastAPI main backend
  # ---------------------------------------------------------------------------
  esg-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    container_name: esg-api
    restart: always
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://esg_user:${POSTGRES_PASSWORD}@postgres:5432/esg_platform
      - DATABASE_URL_SYNC=postgresql://esg_user:${POSTGRES_PASSWORD}@postgres:5432/esg_platform
      - REDIS_URL=redis://redis:6379/0
      - JENA_FUSEKI_URL=http://jena-fuseki:3030
      - MINIO_ENDPOINT=minio:9000
      - MIROFISH_URL=http://mirofish:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - esg-network
    # No ports exposed — nginx handles all external traffic

  # ---------------------------------------------------------------------------
  # 2. esg-worker — Celery worker
  # ---------------------------------------------------------------------------
  esg-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: esg-worker
    restart: always
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://esg_user:${POSTGRES_PASSWORD}@postgres:5432/esg_platform
      - DATABASE_URL_SYNC=postgresql://esg_user:${POSTGRES_PASSWORD}@postgres:5432/esg_platform
      - REDIS_URL=redis://redis:6379/0
      - JENA_FUSEKI_URL=http://jena-fuseki:3030
      - MIROFISH_URL=http://mirofish:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 3. esg-beat — Celery beat scheduler (news ingestion, cleanup)
  # ---------------------------------------------------------------------------
  esg-beat:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: esg-beat
    restart: always
    command: ["celery", "-A", "backend.tasks.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 4. mirofish — MiroFish prediction engine (port 5001 internal only)
  # Per CLAUDE.md: AGPL-3.0 — separate microservice (process isolation)
  # ---------------------------------------------------------------------------
  mirofish:
    build:
      context: .
      dockerfile: docker/mirofish.Dockerfile
    container_name: mirofish
    restart: always
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5001/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - esg-network
    # No ports exposed — only accessible via nginx /predict/

  # ---------------------------------------------------------------------------
  # 5. postgres — PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: esg-postgres
    restart: always
    environment:
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: esg_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - esg-network
    # No ports exposed in production — internal only

  # ---------------------------------------------------------------------------
  # 6. redis — Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: esg-redis
    restart: always
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 7. jena-fuseki — Apache Jena Fuseki
  # ---------------------------------------------------------------------------
  jena-fuseki:
    image: stain/jena-fuseki:5.1.0
    container_name: esg-jena
    restart: always
    environment:
      ADMIN_PASSWORD: ${JENA_ADMIN_PASSWORD}
      FUSEKI_DATASET_1: esg
    volumes:
      - jena-data:/fuseki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 8. minio — MinIO S3-compatible file storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: esg-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 9. nginx — Reverse proxy (ports 80/443)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: esg-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      esg-api:
        condition: service_healthy
      mirofish:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    networks:
      - esg-network

networks:
  esg-network:
    driver: bridge

volumes:
  postgres-data:
    name: esg-postgres-data
  redis-data:
    name: esg-redis-data
  jena-data:
    name: esg-jena-data
  minio-data:
    name: esg-minio-data
  nginx-cache:
    name: esg-nginx-cache
