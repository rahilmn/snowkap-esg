# SNOWKAP ESG Platform — Nginx Reverse Proxy
# Per CLAUDE.md & MASTER_BUILD_PLAN Phase 8:
#   /api/     → FastAPI (esg-api:8000)
#   /predict/ → MiroFish (mirofish:5001)
#   /ws/      → Socket.IO (esg-api:8000)
#   /         → Frontend static files

upstream esg_api {
    server esg-api:8000;
}

upstream mirofish {
    server mirofish:5001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # API routes → FastAPI
    location /api/ {
        proxy_pass http://esg_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MiroFish prediction routes
    location /predict/ {
        proxy_pass http://mirofish;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket
    location /ws/ {
        proxy_pass http://esg_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://esg_api/api/health;
    }

    # Frontend static files (when built)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
