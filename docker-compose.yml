# =============================================================================
# SNOWKAP ESG Platform — Docker Compose (8 Services)
# Per CLAUDE.md: esg-api, esg-worker, mirofish, postgres, redis, jena-fuseki, minio, nginx
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1. esg-api — FastAPI main backend (port 8000)
  # ---------------------------------------------------------------------------
  esg-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    container_name: esg-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://esg_user:esg_password@postgres:5432/esg_platform
      - DATABASE_URL_SYNC=postgresql://esg_user:esg_password@postgres:5432/esg_platform
      - REDIS_URL=redis://redis:6379/0
      - JENA_FUSEKI_URL=http://jena-fuseki:3030
      - MINIO_ENDPOINT=minio:9000
      - MIROFISH_URL=http://mirofish:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 2. esg-worker — Celery worker
  # ---------------------------------------------------------------------------
  esg-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: esg-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://esg_user:esg_password@postgres:5432/esg_platform
      - DATABASE_URL_SYNC=postgresql://esg_user:esg_password@postgres:5432/esg_platform
      - REDIS_URL=redis://redis:6379/0
      - JENA_FUSEKI_URL=http://jena-fuseki:3030
      - MIROFISH_URL=http://mirofish:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 3. mirofish — MiroFish prediction engine (port 5001)
  # Per CLAUDE.md: AGPL-3.0 — separate microservice (process isolation)
  # ---------------------------------------------------------------------------
  mirofish:
    build:
      context: .
      dockerfile: docker/mirofish.Dockerfile
    container_name: mirofish
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 4. postgres — PostgreSQL 16 + pgvector (port 5432)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: esg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_password
      POSTGRES_DB: esg_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 5. redis — Redis 7 (port 6379)
  # Per CLAUDE.md: cache, pub/sub, Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: esg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 6. jena-fuseki — REPLACED by rdflib (in-process). Kept for reference.
  # ---------------------------------------------------------------------------
  # jena-fuseki:
  #   image: stain/jena-fuseki:5.2.0
  #   container_name: esg-jena
  #   restart: unless-stopped
  #   environment:
  #     ADMIN_PASSWORD: admin123
  #     FUSEKI_DATASET_1: esg
  #   volumes:
  #     - jena-data:/fuseki
  #   ports:
  #     - "3030:3030"
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030/$/ping"]
  #     interval: 15s
  #     timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 7. minio — MinIO S3-compatible file storage (port 9000)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: esg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - esg-network

  # ---------------------------------------------------------------------------
  # 8. nginx — Reverse proxy (port 80)
  # Per CLAUDE.md: /api/ → FastAPI, /predict/ → MiroFish, /ws/ → Socket.IO
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: esg-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - esg-api
      - mirofish
    networks:
      - esg-network

networks:
  esg-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  # jena-data:  # replaced by rdflib in-process
  minio-data:
