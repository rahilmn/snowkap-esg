name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + type-check + test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: esg_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: esg_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Stage 8.4: Ruff linting — catches style/import/type issues
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/ --select E,F,I --ignore E501

      - name: Syntax check
        run: python -m py_compile backend/main.py

      - name: Compile all Python files
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('__pycache__', '.git', 'node_modules', 'venv')]
              for f in files:
                  if f.endswith('.py'):
                      try:
                          py_compile.compile(os.path.join(root, f), doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print(f'All Python files compiled successfully')
          "

      # Stage 8.4: Removed continue-on-error — tests must pass
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://esg_user:test_password@localhost:5432/esg_platform_test
          DATABASE_URL_SYNC: postgresql://esg_user:test_password@localhost:5432/esg_platform_test
          REDIS_URL: redis://localhost:6379/0
          JENA_FUSEKI_URL: http://localhost:3030
          JWT_SECRET: test-jwt-secret-min-32-characters-long
          SECRET_KEY: test-secret-key-min-32-characters-long
          ENVIRONMENT: test
        run: python -m pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Frontend: lint + type-check + build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci || npm install

      # Stage 8.4: Removed continue-on-error — type check must pass
      - name: Type check
        working-directory: client
        run: npx tsc --noEmit

      # Stage 8.4: Frontend build is a hard gate
      - name: Build
        working-directory: client
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker: build images
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t snowkap-api:test .

      - name: Build Worker image
        run: docker build -f docker/worker.Dockerfile -t snowkap-worker:test .

      - name: Build MiroFish image
        run: docker build -f docker/mirofish.Dockerfile -t snowkap-mirofish:test .
