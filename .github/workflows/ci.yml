name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend: compile + the FULL pytest suite (SQLite-backed, no server/DB/keys).
  # ---------------------------------------------------------------------------
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Phase 46 removed the `backend/` package; the engine lives in api/ +
      # engine/. Style lint is advisory (does not gate the build).
      - name: Lint (ruff, advisory)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check api/ engine/ --select E,F,I --ignore E501

      - name: Compile all Python files
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for top in ('api', 'engine', 'tests', 'scripts'):
              for root, dirs, files in os.walk(top):
                  dirs[:] = [d for d in dirs if d not in ('__pycache__', '.git', 'node_modules', 'venv')]
                  for f in files:
                      if f.endswith('.py'):
                          try:
                              py_compile.compile(os.path.join(root, f), doraise=True)
                          except py_compile.PyCompileError as e:
                              errors.append(str(e))
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print('All Python files compiled successfully')
          "

      # Full suite. SQLite-backed (Phase 48.0 hard-disables SQLite unless
      # SNOWKAP_ALLOW_SQLITE=1) so it needs no Postgres, no server, no API keys.
      - name: Run the full test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
          SNOWKAP_DB_BACKEND: "sqlite"
          SNOWKAP_ALLOW_SQLITE: "1"
          JWT_SECRET: "ci-test-jwt-secret-min-32-characters-long"
          ENVIRONMENT: "test"
          SNOWKAP_ENV: "test"
        run: |
          python -m pytest tests/ \
            -q --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results.xml

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml

  # ---------------------------------------------------------------------------
  # Frontend: type check + build
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci || npm install

      - name: Type check
        working-directory: client
        run: npm run type-check

      - name: Build
        working-directory: client
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker: validate the Railway deploy image (root Dockerfile) builds.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build the deploy image
        run: docker build -f Dockerfile -t snowkap-esg:ci .
