name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + compile + unit tests (no DB/server required)
  # ---------------------------------------------------------------------------
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/ --select E,F,I --ignore E501

      - name: Compile all Python files
        run: |
          python -c "
          import py_compile, os, sys
          errors = []
          for root, dirs, files in os.walk('backend'):
              dirs[:] = [d for d in dirs if d not in ('__pycache__', '.git', 'node_modules', 'venv')]
              for f in files:
                  if f.endswith('.py'):
                      try:
                          py_compile.compile(os.path.join(root, f), doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print('All backend Python files compiled successfully')
          "

      # Only run test_pipeline.py and test_llm_parsing.py in CI — they are
      # pure unit tests that don't need a running server, database, or API keys.
      # test_integration.py and test_security_fixes.py require a live server.
      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          REDIS_URL: "redis://localhost:6379/0"
          JENA_FUSEKI_URL: "http://localhost:3030"
          JWT_SECRET: "ci-test-jwt-secret-min-32-characters-long"
          SECRET_KEY: "ci-test-secret-key-min-32-characters-long"
          ENVIRONMENT: "test"
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: |
          python -m pytest \
            backend/tests/test_pipeline.py \
            backend/tests/test_llm_parsing.py \
            -v --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results.xml

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml

  # ---------------------------------------------------------------------------
  # Frontend: type check + build
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci || npm install

      - name: Type check
        working-directory: client
        run: npm run type-check

      - name: Build
        working-directory: client
        run: npm run build
